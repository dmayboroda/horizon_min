# =============================================================================
# Duck Hunt GRPO Training — Qwen3-VL-8B-Instruct (4-bit QLoRA, 2x A100 80GB)
# =============================================================================
# Qwen3-VL-8B: ~8B params, strong vision-language model
# 4-bit quantization: ~6GB per GPU, fits easily on A100 80GB
# Use with: accelerate launch --num_processes=2 --mixed_precision=bf16
#
# Tool call format: <tool_call>{"name": "shoot", "arguments": {...}}</tool_call>
#
# Usage:
#   accelerate launch --num_processes=2 --mixed_precision=bf16 \
#       train.py --config configs/qwen3_vl_8b_config.yaml --custom \
#       --override training.max_steps=25000 \
#       --override grpo.curriculum_phase2_step=15000

model:
  model_name: "Qwen/Qwen3-VL-8B-Instruct"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"   # Qwen3-VL supports flash-attn
  trust_remote_code: true
  device_map: "auto"
  quantization: "4bit"                       # QLoRA — ~6GB VRAM per GPU

lora:
  enabled: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  task_type: "CAUSAL_LM"
  bias: "none"

grpo:
  num_generations: 6
  max_completion_length: 60                  # Qwen JSON tool calls are longer than LiquidAI pythonic
  temperature: 1.0
  top_p: 0.95
  top_k: 0
  beta: 0.0                                 # no KL anchor
  num_iterations: 1
  epsilon: 0.2
  loss_type: "grpo"
  scale_rewards: "group"
  entropy_coeff: 0.0                        # temperature handles exploration
  entropy_floor: 0.0
  entropy_floor_coeff: 0.0
  # Curriculum: phase 1 = learn (x,y), phase 2 = learn horizon
  curriculum_phase2_step: 15000
  phase1_max_completion_length: 50           # JSON format needs more tokens than pythonic
  # Early training stabilization
  stabilization_steps: 0
  stabilization_grad_accum: 8
  lora_freeze_steps: 0
  use_vllm: false

training:
  output_dir: "./outputs/qwen3_vl_8b_duckhunt_grpo"
  num_train_epochs: 3
  max_steps: -1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-5
  warmup_ratio: 0.03
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  logging_steps: 1
  save_steps: 500
  save_total_limit: 3
  eval_strategy: "no"
  eval_steps: 100
  seed: 42
  dataloader_num_workers: 4
  gradient_checkpointing: true

environment:
  latency_options_ms: [200, 300, 400, 500, 600]   # 8B model is slower
  frames_per_observation: 2
  frames_per_observation_min: 2
  frames_per_observation_max: 4
  frame_skip: 6

reward:
  hit: 1.0
  double_kill: 2.5
  miss: -0.3
  shoot_nothing: -0.5
  lambda_horizon: 0.1
  proximity_bonus: 0.5
  proximity_decay: 3.0
  edge_bonus: 0.3
  hitbox_center_bonus: 0.5
  hotspot_enabled: true
  skip_invalid_generations: false              # model needs format learning initially
  skip_no_target: true
  format_weight: 0.3
  accuracy_weight: 1.0

logging:
  wandb_project: "duckhunt-grpo"
  wandb_run_name: "qwen3-vl-8b-grpo-v1"
  report_to: "wandb"
  log_completions: true
  num_completions_to_print: 5
