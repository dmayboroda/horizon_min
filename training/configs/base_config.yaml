# =============================================================================
# Duck Hunt GRPO Training — Base Configuration
# =============================================================================
# Default hyperparameters. Override with model-specific configs or CLI flags.

environment:
  server_host: "localhost"
  server_port: 8000
  screen_width: 800
  screen_height: 500
  frame_output_size: [512, 512]
  frames_per_observation: 4
  frames_per_observation_min: 2
  frames_per_observation_max: 6
  fps: 30
  max_horizon: 30
  latency_options_ms: [100, 200, 300, 400, 500, 600]

model:
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"
  trust_remote_code: true
  device_map: "auto"

lora:
  enabled: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  task_type: "CAUSAL_LM"
  bias: "none"

grpo:
  num_generations: 4
  max_completion_length: 256
  temperature: 0.7
  top_p: 0.95
  top_k: 0
  beta: 0.0
  num_iterations: 1
  epsilon: 0.2
  loss_type: "grpo"
  scale_rewards: "group"
  use_vllm: false

training:
  output_dir: "./outputs/duckhunt_grpo"
  num_train_epochs: 3
  max_steps: -1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-5
  warmup_ratio: 0.05
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  logging_steps: 1
  save_steps: 50
  save_total_limit: 3
  eval_strategy: "steps"
  eval_steps: 50
  seed: 42
  dataloader_num_workers: 4
  gradient_checkpointing: true

reward:
  hit: 1.0
  double_kill: 2.5
  miss: -0.3
  shoot_nothing: -0.5
  lambda_horizon: 0.1
  bonus_perfect_match: 0.5
  bonus_perfect_round: 2.0
  format_weight: 0.3
  accuracy_weight: 1.0

logging:
  wandb_project: "duckhunt-grpo"
  wandb_entity: null
  wandb_run_name: null
  report_to: "wandb"
  log_completions: true
  num_completions_to_print: 5

hub:
  push_to_hub: false
  hub_model_id: null  # e.g. "username/duckhunt-grpo"
  hub_private: true
