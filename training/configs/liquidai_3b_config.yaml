# =============================================================================
# Duck Hunt GRPO Training — LiquidAI LFM2-VL-3B (v2 — from scratch)
# =============================================================================
# LFM2-VL-3B: ~3B params total, vision-language model with SigLIP2
# Requires ~16GB VRAM (BF16), ~8GB with 4-bit quantization.
# 32k context window, multimodal (SigLIP2 NaFlex 512×512 tiles).
#
# Tool call format: <|tool_call_start|>[shoot(x=0.3, y=0.2)]<|tool_call_end|>
#
# Usage:
#   python train.py --config configs/liquidai_3b_config.yaml --custom \
#       --override training.max_steps=25000 \
#       --override grpo.curriculum_phase2_step=15000

model:
  model_name: "LiquidAI/LFM2-VL-3B"
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"
  trust_remote_code: true
  device_map: "auto"
  quantization: null

lora:
  enabled: true
  r: 16
  lora_alpha: 16
  lora_dropout: 0.0
  target_modules:
    # LM decoder
    - q_proj
    - k_proj
    - v_proj
    - out_proj
    - in_proj
    - w1
    - w2
    - w3
    # Vision encoder (SigLIP2) — FFN
    - fc1
    - fc2
    # Vision-to-LM projector
    - linear_1
    - linear_2
  task_type: "CAUSAL_LM"
  bias: "none"

grpo:
  num_generations: 8
  max_completion_length: 40
  temperature: 1.0
  top_p: 0.95
  top_k: 0
  beta: 0.02                               # small KL anchor to reference model
  num_iterations: 1
  epsilon: 0.2
  loss_type: "grpo"
  scale_rewards: "group"
  entropy_coeff: 0.03
  entropy_floor: 0.8                       # emergency brake — penalty if entropy drops below
  entropy_floor_coeff: 1.0
  # Curriculum: phase 1 = learn (x,y), phase 2 = learn horizon
  curriculum_phase2_step: 15000
  phase1_max_completion_length: 30
  # Early training stabilization
  stabilization_steps: 0                   # disabled — use consistent grad_accum
  stabilization_grad_accum: 8
  lora_freeze_steps: 0
  use_vllm: false

training:
  output_dir: "./outputs/lfm2_3b_duckhunt_grpo_v2"
  num_train_epochs: 3
  max_steps: -1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5                    # lowered for LoRA stability
  warmup_ratio: 0.03
  weight_decay: 0.01
  lr_scheduler_type: "constant_with_warmup"
  max_grad_norm: 0.3                       # tighter clip to prevent loss spikes
  bf16: true
  fp16: false
  logging_steps: 1
  save_steps: 500
  save_total_limit: 3
  eval_strategy: "no"
  eval_steps: 100
  seed: 42
  dataloader_num_workers: 4
  gradient_checkpointing: true

environment:
  latency_options_ms: [150, 200, 300, 400, 500]
  frames_per_observation: 2
  frames_per_observation_min: 2
  frames_per_observation_max: 4
  frame_skip: 6

reward:
  hit: 1.0
  double_kill: 2.5
  miss: -0.1
  shoot_nothing: -0.5
  lambda_horizon: 0.1
  proximity_bonus: 1.0
  proximity_decay: 3.0
  edge_bonus: 0.3                          # reward hitting ducks away from screen center
  hitbox_center_bonus: 0.5                 # reward precision — hitting center of duck
  hotspot_enabled: true                    # target-aware hotspot (skips if near duck)
  skip_invalid_generations: false          # keep invalid gens — model needs format learning
  format_weight: 0.3                       # tool call correctness reward
  accuracy_weight: 1.0
  reward_normalization: "group"            # group / moving_avg / per_component

logging:
  wandb_project: "duckhunt-grpo"
  wandb_run_name: "lfm2-3b-v2-from-scratch"
  report_to: "wandb"
  log_completions: true
  num_completions_to_print: 5
