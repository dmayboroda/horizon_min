# =============================================================================
# Duck Hunt GRPO Training — LiquidAI LFM2-VL-3B
# =============================================================================
# LFM2-VL-3B: ~3B params total, vision-language model with SigLIP2
# Requires ~16GB VRAM (BF16), ~8GB with 4-bit quantization.
# 32k context window, multimodal (SigLIP2 NaFlex 512×512 tiles).
#
# Tool call format: <|tool_call_start|>[shoot(x=0.3, y=0.2, horizon=5)]<|tool_call_end|>
#
# Usage:
#   python train.py --config configs/liquidai_3b_config.yaml --custom
#   python train.py --config configs/liquidai_3b_config.yaml --custom \
#       --override training.max_steps=25000 \
#       --override grpo.curriculum_phase2_step=15000

model:
  model_name: "LiquidAI/LFM2-VL-3B"
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"
  trust_remote_code: true
  device_map: "auto"
  quantization: null                         # set to "4bit" if VRAM < 16GB

lora:
  enabled: true
  r: 16
  lora_alpha: 16
  lora_dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - out_proj
    - in_proj
    - w1
    - w2
    - w3
  task_type: "CAUSAL_LM"
  bias: "none"

grpo:
  num_generations: 4                         # reduced from 6 — larger model needs more VRAM per generation
  max_completion_length: 40
  temperature: 1.0
  top_p: 0.95
  top_k: 0
  beta: 0.01
  num_iterations: 1
  epsilon: 0.2
  loss_type: "grpo"
  scale_rewards: "group"
  entropy_coeff: 0.002                      
  entropy_floor: 0.0
  entropy_floor_coeff: 0.0
  # Curriculum: phase 1 = learn (x,y), phase 2 = learn horizon
  curriculum_phase2_step: 15000
  phase1_max_completion_length: 30
  # Early training stabilization
  stabilization_steps: 500
  stabilization_grad_accum: 8
  lora_freeze_steps: 0
  use_vllm: false

training:
  output_dir: "./outputs/lfm2_3b_duckhunt_grpo"
  num_train_epochs: 3
  max_steps: -1
  per_device_train_batch_size: 1             # reduced from 2 — 3B model needs more VRAM
  gradient_accumulation_steps: 8             # increased to compensate for smaller batch
  learning_rate: 1.0e-5
  warmup_ratio: 0.03
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  logging_steps: 1
  save_steps: 500
  save_total_limit: 3
  eval_strategy: "no"
  eval_steps: 100
  seed: 42
  dataloader_num_workers: 4
  gradient_checkpointing: true

environment:
  latency_options_ms: [150, 200, 300, 400, 500]  # shifted up — larger model is slower
  frames_per_observation: 2
  frames_per_observation_min: 2
  frames_per_observation_max: 4
  frame_skip: 6

reward:
  hit: 1.0
  double_kill: 2.5
  miss: -0.3
  shoot_nothing: -0.5
  lambda_horizon: 0.1
  proximity_bonus: 0.5                     # less generous — 3B model learns from hits, not near-misses
  proximity_decay: 3.0                     # sharp gradient — only reward very close misses
  format_weight: 0.1                       # stronger format pressure — penalize safety refusals harder
  accuracy_weight: 1.0

logging:
  wandb_project: "duckhunt-grpo"
  wandb_run_name: "lfm2-vl-3b-grpo-v1"
  report_to: "wandb"
  log_completions: true
  num_completions_to_print: 5
